version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_DOMAIN: localhost
        NEXT_PUBLIC_PORT: 8000
    ports:
      - "3000:3000"
    restart: unless-stopped
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ../../values:/app/helm-values
      - ../../scripts:/app/scripts
      - ${KUBECONFIG_PATH:-~/.kube/config}:/root/.kube/config:ro
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - PROMETHEUS_URL=http://prometheus.lava.infra:80
      - TENANT_ID=default
      - IS_SEND_METRICS_TO_S3=false
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=password
    ports:
      - "8000:8000"
    extra_hosts:
      - "prometheus.lava.infra:127.0.0.1"
      - "grafana.lava.infra:127.0.0.1"
    restart: unless-stopped
