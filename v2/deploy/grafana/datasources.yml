# Grafana datasource provisioning for the bundled logs stack.
# Auto-wires Loki so Grafana shows logs with zero manual setup on first boot.
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    # Pinned uid so the provisioned "Smart Router Dashboard Logs" dashboard
    # (which references datasource uid "loki") resolves without re-selection.
    uid: loki
    access: proxy
    # Service name from the compose file; both share the project network so this
    # DNS name resolves.
    url: http://loki:3100
    isDefault: true
    editable: true
