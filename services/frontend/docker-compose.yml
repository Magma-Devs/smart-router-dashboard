version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: infrastructure-health-dashboard
    container_name: health-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next

  # Mock API service for development/testing
  mock-api:
    image: node:18-alpine
    container_name: mock-api
    working_dir: /app
    volumes:
      - ./mock-api:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "npm install -g json-server && 
             json-server --watch db.json --port 8000 --routes routes.json --middlewares middleware.js"
    restart: unless-stopped
