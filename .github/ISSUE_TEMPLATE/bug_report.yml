name: 🐛 Bug report
description: Create a report to help us squash bugs!
title: "[Bug]: "
labels: ["T:Bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Before smashing the submit button please review the template.

  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search existing issues to avoid creating duplicates.
      options:
        - label: I have searched the existing issues
          required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true

  - type: input
    attributes:
      label: Dashboard Version
      description: The dashboard version/commit (see the Account page or `GET /version` on the api)
      placeholder: 0.4.0, main, ghcr tag, etc.
    validations:
      required: true

  - type: input
    attributes:
      label: Smart Router Version
      description: If applicable, the router version the dashboard is pointed at
      placeholder: smartrouter v1.1.0, ghcr :latest, etc.
    validations:
      required: false

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce?
      description: If applicable could you describe how we could reproduce the bug
      placeholder: Tell us how to reproduce the bug!
    validations:
      required: false
