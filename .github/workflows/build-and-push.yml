name: Build and Push Images

on:
  push:
    branches:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # The dashboard is a pnpm/TypeScript monorepo at the repo root:
  #   apps/api  → published as …/backend   (Fastify Prometheus proxy)
  #   apps/web  → published as …/frontend  (Next.js UI)
  # The image names (backend/frontend) are the ones the smart-router helm
  # chart consumes, so the build target (api/web) maps onto them here.
  build-and-push:
    name: Build and Push ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            dockerfile: apps/web/Dockerfile
          - name: backend
            dockerfile: apps/api/Dockerfile
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version from VERSION file
        id: read-version
        run: |
          if [ ! -f VERSION ] || [ -z "$(tr -d ' \n\r' < VERSION)" ]; then
            echo "Error: VERSION file not found or is empty"
            exit 1
          fi
          VERSION=$(tr -d ' \n\r' < VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Read version: $VERSION"

      - name: Validate version was bumped
        id: validate-version
        if: github.ref_name == 'main'
        run: |
          NEW_VERSION="${{ steps.read-version.outputs.version }}"

          # Get latest tag (remove 'v' prefix if present)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tags found. This appears to be the first release."
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "is_first_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Remove 'v' prefix from tag for comparison
          LATEST_VERSION="${LATEST_TAG#v}"

          echo "Latest tag: $LATEST_TAG (version: $LATEST_VERSION)"
          echo "New version: $NEW_VERSION"

          # Compare versions using sort -V (version sort)
          if [ "$(printf '%s\n' "$LATEST_VERSION" "$NEW_VERSION" | sort -V | head -n1)" = "$NEW_VERSION" ]; then
            if [ "$LATEST_VERSION" = "$NEW_VERSION" ]; then
              echo "Error: Version $NEW_VERSION is the same as the latest tag $LATEST_TAG"
              echo "Please bump the version in the VERSION file before releasing."
              exit 1
            fi
            echo "Error: Version $NEW_VERSION is older than the latest tag $LATEST_TAG (version $LATEST_VERSION)"
            echo "Please bump the version in the VERSION file before releasing."
            exit 1
          fi

          echo "✓ Version validated: $NEW_VERSION > $LATEST_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "is_first_release=false" >> $GITHUB_OUTPUT

      - name: Normalize version tag
        id: version
        run: |
          # Use validated version if on main, otherwise use read version
          if [ "${{ github.ref_name }}" = "main" ] && [ -n "${{ steps.validate-version.outputs.version }}" ]; then
            VERSION="${{ steps.validate-version.outputs.version }}"
          else
            VERSION="${{ steps.read-version.outputs.version }}"
          fi

          BRANCH_NAME="${{ github.ref_name }}"

          # If branch is not main, append branch name to version
          if [ "$BRANCH_NAME" != "main" ]; then
            VERSION="${VERSION}-${BRANCH_NAME}"
          fi

          # Extract major.minor version
          MAJOR_MINOR=$(echo "$VERSION" | cut -d'.' -f1,2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image version already exists
        if: github.ref_name == 'main'
        run: |
          set +e  # Don't stop on errors
          set -x  # Enable debug output
          IMAGE_NAME="${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}"
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE_TAG="${IMAGE_NAME}:${VERSION}"

          echo "Checking if image tag already exists: $IMAGE_TAG"

          # Use Docker manifest inspect to check if the tag exists
          # Exit code 0 = manifest exists, exit code 1 = doesn't exist (manifest unknown)
          echo run: docker manifest inspect "$IMAGE_TAG"
          MANIFEST_OUTPUT=$(docker manifest inspect "$IMAGE_TAG" 2>&1)
          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "Error: Image tag $IMAGE_TAG already exists in the registry"
            echo "Cannot overwrite existing version. Please bump the version in the VERSION file."
            exit 1
          elif [ $EXIT_CODE -eq 1 ]; then
            # Exit code 1 with "manifest unknown" means the image doesn't exist (expected)
            if echo "$MANIFEST_OUTPUT" | grep -qiE "manifest unknown|not found|404|no such manifest"; then
              echo "✓ Image tag $IMAGE_TAG does not exist. Safe to proceed."
            else
              echo "Warning: Unexpected error checking manifest (exit code 1)"
              echo "Output was: $MANIFEST_OUTPUT"
              echo "Proceeding anyway - if the tag exists, the push will fail."
            fi
          else
            echo "Error: Unexpected exit code $EXIT_CODE when checking manifest"
            echo "Docker manifest inspect output: $MANIFEST_OUTPUT"
            echo "Cannot proceed without confirming the tag does not exist."
            exit 1
          fi

      - name: Prepare tags
        id: prepare-tags
        run: |
          {
            echo "type=raw,value=${{ steps.version.outputs.version }}"
            echo "type=raw,value=${{ steps.version.outputs.major_minor }}"
            if [ "${{ github.ref_name }}" = "main" ]; then
              echo "type=raw,value=latest"
            fi
          } | tee tags.txt

          # Output tags as multiline string
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          cat tags.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: ${{ steps.prepare-tags.outputs.tags }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            NEXT_PUBLIC_API_URL=http://localhost:8000
            NEXT_PUBLIC_LOCAL_MODE=true
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
