name: Build and Push Images

on:
  push:
    branches:
      - main
      - MAG-726
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [backend, frontend]
      fail-fast: false
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from VERSION file
        id: read-version
        run: |
          if [ ! -f VERSION ] || [ -z "$(tr -d ' \n\r' < VERSION)" ]; then
            echo "Error: VERSION file not found or is empty"
            exit 1
          fi
          VERSION=$(tr -d ' \n\r' < VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Read version: $VERSION"

      - name: Validate version was bumped
        id: validate-version
        run: |
          NEW_VERSION="${{ steps.read-version.outputs.version }}"
          
          # Get latest tag (remove 'v' prefix if present)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous tags found. This appears to be the first release."
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "is_first_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Remove 'v' prefix from tag for comparison
          LATEST_VERSION="${LATEST_TAG#v}"
          
          echo "Latest tag: $LATEST_TAG (version: $LATEST_VERSION)"
          echo "New version: $NEW_VERSION"
          
          # Compare versions using sort -V (version sort)
          if [ "$(printf '%s\n' "$LATEST_VERSION" "$NEW_VERSION" | sort -V | head -n1)" = "$NEW_VERSION" ]; then
            if [ "$LATEST_VERSION" = "$NEW_VERSION" ]; then
              echo "Error: Version $NEW_VERSION is the same as the latest tag $LATEST_TAG"
              echo "Please bump the version in the VERSION file before releasing."
              exit 1
            fi
            echo "Error: Version $NEW_VERSION is older than the latest tag $LATEST_TAG (version $LATEST_VERSION)"
            echo "Please bump the version in the VERSION file before releasing."
            exit 1
          fi
          
          echo "✓ Version validated: $NEW_VERSION > $LATEST_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "is_first_release=false" >> $GITHUB_OUTPUT

      - name: Normalize version tag
        id: version
        run: |
          VERSION="${{ steps.validate-version.outputs.version }}"
          # Extract major.minor version
          MAJOR_MINOR=$(echo "$VERSION" | cut -d'.' -f1,2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image version already exists
        run: |
          IMAGE_NAME="${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}"
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE_TAG="${IMAGE_NAME}:${VERSION}"
          
          echo "Checking if image tag already exists: $IMAGE_TAG"
          
          # Use Docker manifest inspect to check if the tag exists
          # This works after we've logged in to the registry
          # Exit code 0 = manifest exists, non-zero = doesn't exist or error
          ERROR_OUTPUT=$(docker manifest inspect "$IMAGE_TAG" 2>&1)
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "Error: Image tag $IMAGE_TAG already exists in the registry"
            echo "Cannot overwrite existing version. Please bump the version in the VERSION file."
            exit 1
          else
            # Check if it's a "not found" error (expected) vs other error (unexpected)
            if echo "$ERROR_OUTPUT" | grep -qiE "manifest unknown|not found|404|no such manifest"; then
              echo "✓ Image tag $IMAGE_TAG does not exist. Safe to proceed."
            else
              echo "Error: Unable to verify if image tag exists"
              echo "Docker manifest inspect output: $ERROR_OUTPUT"
              echo "Exit code: $EXIT_CODE"
              echo "Cannot proceed without confirming the tag does not exist."
              echo "This prevents accidentally overwriting existing versions."
              exit 1
            fi
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          tags: ${{ steps.meta.outputs.tags }}
          registry: ${{ env.REGISTRY }}
          directory: ./${{ matrix.image }}
          dockerfile: ./${{ matrix.image }}/Dockerfile
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          pushImage: true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

