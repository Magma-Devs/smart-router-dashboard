name: Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Checkout + run tests only — no write surface needed.
permissions:
  contents: read

jobs:
  v2:
    name: v2 Checks (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable corepack and install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @sr/shared build && pnpm --filter @sr/db build

      - name: Type check (all packages)
        run: pnpm -r typecheck

      - name: Tests (all packages)
        run: pnpm -r test

  # ── Legacy v1 checks (backend/ + frontend/) — remove with v1 ──
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack and install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Check formatting (Prettier)
        continue-on-error: true
        run: pnpm format:check

      - name: Type check (TypeScript)
        run: pnpm exec tsc --noEmit

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: make install-dev

      - name: Check formatting (Black)
        continue-on-error: true
        run: make check-format

      - name: Run tests
        continue-on-error: true
        run: pytest --tb=short -q
