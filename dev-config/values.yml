# Smart Router Direct RPC Configuration — multi-chain + CROSS-VALIDATION
# Mode: Direct connections to public endpoints (no Lava providers!)
#
# Same upstream layout as smartrouter_multichain.yml — every bundled example
# chain on its own port — but this variant ALSO enables per-method
# cross-validation so reads are corroborated across two distinct vendor groups
# before being returned. Only chains with TWO public vendor groups carry a
# policy (BTC and HYPERLIQUID have a single public source here, so they're served
# without corroboration).
#
#   3360  ETH1        jsonrpc        ethereum-rpc.publicnode.com + mainnet.gateway.tenderly.co
#   3361  SOLANA      jsonrpc        solana-rpc.publicnode.com   + api.mainnet-beta.solana.com
#   3362  BTC         jsonrpc        bitcoin-rpc.publicnode.com
#   3363  HYPERLIQUID jsonrpc        rpc.hyperliquid.xyz/evm
#   3364  COSMOSHUB   rest           cosmos-rest.publicnode.com  + cosmos-api.polkachu.com
#   3365  COSMOSHUB   tendermintrpc  cosmos-rpc.publicnode.com   + cosmos-rpc.polkachu.com
#   3366  COSMOSHUB   grpc           cosmos-grpc.publicnode.com  + cosmos-grpc.polkachu.com
#   3367  APT1        rest           aptos-rest.publicnode.com   + fullnode.mainnet.aptoslabs.com
#
# ETH1 requires a ws:// leg, so it pairs an https url with a wss one. SOLANA,
# BTC, HYPERLIQUID (jsonrpc) and APT1 (rest) are HTTP-only here, so start the
# router with --skip-websocket-verification (the docker-compose example does this).
#
# Specs resolve from the lava-specs GitHub repo (the dashboard compose passes
# --use-static-spec https://github.com/Magma-Devs/lava-specs/tree/main): ETH1,
# SOLANA, BTC, HYPERLIQUID, APT1, and COSMOSHUB (imports COSMOSSDK50 + COSMOSWASM,
# which pull in COSMOSSDK -> IBC + TENDERMINT) — all present in the repo.

# Prometheus metrics (scrape at http://<host>:7779/metrics). Set to
# "disabled" to turn off. Read via viper, so the --metrics-listen-address
# flag overrides this if both are set.
metrics-listen-address: "0.0.0.0:7779"

endpoints:
  - listen-address: "0.0.0.0:3360"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3360"

  - listen-address: "0.0.0.0:3361"
    chain-id: "SOLANA"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3361"

  - listen-address: "0.0.0.0:3362"
    chain-id: "BTC"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3362"

  - listen-address: "0.0.0.0:3363"
    chain-id: "HYPERLIQUID"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3363"

  - listen-address: "0.0.0.0:3364"
    chain-id: "COSMOSHUB"
    api-interface: "rest"
    network-address: "0.0.0.0:3364"

  - listen-address: "0.0.0.0:3365"
    chain-id: "COSMOSHUB"
    api-interface: "tendermintrpc"
    network-address: "0.0.0.0:3365"

  - listen-address: "0.0.0.0:3366"
    chain-id: "COSMOSHUB"
    api-interface: "grpc"
    network-address: "0.0.0.0:3366"

  - listen-address: "0.0.0.0:3367"
    chain-id: "APT1"
    api-interface: "rest"
    network-address: "0.0.0.0:3367"

direct-rpc:
  # Two distinct sources per chain<>interface where a second public vendor
  # exists. The cross-validation block below requires both groups to corroborate
  # reads.

  # ---- Ethereum (ETH1, chainId 0x1) ----
  # `addons` on a node-url advertise the extra capabilities that upstream
  # serves (archive state, debug_*/trace_* namespaces). The dashboard surfaces
  # them as capability chips on the Upstreams + Endpoints pages; the Try-now
  # console unlocks the matching tiers. Declared here on eth-publicnode so the
  # feature is visible out-of-the-box — set them to match what YOUR upstream
  # actually supports.
  - name: "eth-publicnode"
    group-label: "publicnode"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    # Only advertise addons the upstream ACTUALLY serves — the router verifies
    # each on startup (e.g. it probes debug_getRawHeader for `debug`) and, if the
    # probe fails, EXCLUDES the whole provider. That drops ETH1 to a single group
    # and violates the cross-validation min-groups:2 policy below, killing the
    # router. publicnode's free ETH endpoint serves archive state but NOT the
    # debug_* / trace_* namespaces, so we claim archive only. (Point this at an
    # upstream that serves debug/trace to re-enable those tiers.)
    node-urls:
      - url: "https://ethereum-rpc.publicnode.com"
        addons: ["archive"]
      - url: "wss://ethereum-rpc.publicnode.com"

  - name: "eth-tenderly"
    group-label: "tenderly"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://mainnet.gateway.tenderly.co"
      - url: "wss://mainnet.gateway.tenderly.co"

  # ---- Solana (SOLANA) — HTTP-only ----
  - name: "sol-publicnode"
    group-label: "publicnode"
    chain-id: "SOLANA"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://solana-rpc.publicnode.com"
        # PublicNode's free tier blocks getProgramAccounts (the spec's
        # tokens-owner-indexed verification), so skip that startup check here.
        skip-verifications:
          - tokens-owner-indexed

  - name: "sol-solana-labs"
    group-label: "solana-labs"
    chain-id: "SOLANA"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://api.mainnet-beta.solana.com"

  # ---- Bitcoin (BTC) — single public source; served without corroboration ----
  - name: "btc-publicnode"
    group-label: "publicnode"
    chain-id: "BTC"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://bitcoin-rpc.publicnode.com"

  # ---- Hyperliquid (HYPERLIQUID) — single public source; served without corroboration ----
  - name: "hyperliquid-official"
    group-label: "hyperliquid"
    chain-id: "HYPERLIQUID"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://rpc.hyperliquid.xyz/evm"

  # ---- Cosmos Hub (COSMOSHUB) — REST + Tendermint RPC + gRPC, two sources each ----
  - name: "cosmos-rest-publicnode"
    group-label: "publicnode"
    chain-id: "COSMOSHUB"
    api-interface: "rest"
    node-urls:
      - url: "https://cosmos-rest.publicnode.com"
        timeout: 10s
        skip-verifications:
          - pruning

  - name: "cosmos-rest-polkachu"
    group-label: "polkachu"
    chain-id: "COSMOSHUB"
    api-interface: "rest"
    node-urls:
      - url: "https://cosmos-api.polkachu.com"
        timeout: 10s
        skip-verifications:
          - pruning

  - name: "cosmos-tendermintrpc-publicnode"
    group-label: "publicnode"
    chain-id: "COSMOSHUB"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://cosmos-rpc.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning
      - url: "wss://cosmos-rpc.publicnode.com:443/websocket"
        skip-verifications:
          - pruning

  - name: "cosmos-tendermintrpc-polkachu"
    group-label: "polkachu"
    chain-id: "COSMOSHUB"
    api-interface: "tendermintrpc"
    node-urls:
      # Polkachu serves tendermint over HTTP only (no websocket leg).
      - url: "https://cosmos-rpc.polkachu.com"
        timeout: 10s
        skip-verifications:
          - pruning

  - name: "cosmos-grpc-publicnode"
    group-label: "publicnode"
    chain-id: "COSMOSHUB"
    api-interface: "grpc"
    node-urls:
      - url: "grpcs://cosmos-grpc.publicnode.com:443"
        auth-config:
          use-tls: true
        skip-verifications:
          - pruning
          - tx-indexing

  - name: "cosmos-grpc-polkachu"
    group-label: "polkachu"
    chain-id: "COSMOSHUB"
    api-interface: "grpc"
    node-urls:
      - url: "grpc://cosmos-grpc.polkachu.com:14990"
        # Polkachu's gRPC is plaintext (no TLS), so explicitly allow it.
        grpc-config:
          allow-insecure: true
        skip-verifications:
          - pruning
          - tx-indexing

  # ---- Aptos (APT1) — REST, two sources; HTTP-only ----
  - name: "aptos-publicnode"
    group-label: "publicnode"
    chain-id: "APT1"
    api-interface: "rest"
    node-urls:
      - url: "https://aptos-rest.publicnode.com/v1"
        timeout: 10s

  - name: "aptos-labs"
    group-label: "aptos-labs"
    chain-id: "APT1"
    api-interface: "rest"
    node-urls:
      - url: "https://fullnode.mainnet.aptoslabs.com/v1"
        timeout: 10s

# Emergency fallback tier. Providers here are ONLY consulted once every primary
# `direct-rpc` provider for a chain<>interface is exhausted (the router logs
# "[BackupProviders] Static providers exhausted — entering backup fallback").
# Same schema as direct-rpc; a distinct vendor per chain so a backup never
# shares an upstream with the primary it's covering. Cross-validation policies
# target the primary groups only — backups just keep the endpoint serving, they
# don't participate in corroboration.
#
# Only providers confirmed to PASS the router's startup verification are kept
# here — a backup that fails verification is excluded at boot and can't fail
# over, so it's just noise. In this all-keyless-public setup only COSMOSHUB
# tendermintrpc has a second verified vendor (ecostake). The rest of the chains
# have no reliable keyless second source today:
#   ETH1        cloudflare-eth returns a non-standard eth_blockNumber shape
#               (GET_BLOCKNUM parse fail); llamarpc's ws is 521.
#   BTC / SOLANA / APT1   Ankr now requires an API key (401/403); aptos public
#               nodes 429.
# They run on their two verified primary sources without a backup. To extend the
# failover tier, add a keyed/private URL here (same schema) — e.g. an Alchemy/
# Infura/QuickNode endpoint whose key lives in the mounted config, or a
# self-hosted node — and it lights up automatically once it verifies.
backup-direct-rpc:
  # ---- Cosmos Hub (COSMOSHUB) Tendermint RPC — ecostake fallback (verified) ----
  - name: "cosmos-tendermintrpc-ecostake-backup"
    group-label: "ecostake"
    chain-id: "COSMOSHUB"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://rpc-cosmoshub.ecostake.com"
        timeout: 10s
        skip-verifications:
          - pruning

# Per-method cross-validation. Each knob resolves as clamp(caller, floor, cap):
# floor = operator minimum the caller may exceed, cap = operator maximum that
# overrides a stricter caller. A bare number N means {floor: N}. chain-id/
# api-interface match case-insensitively; method exactly. Policies on stateful
# (write) methods are rejected at startup.
#
# Each policy below targets a chain<>interface served by two group-labels
# (publicnode + a second vendor). The meaningful diversity bar is min-groups: 2 —
# both vendors must corroborate.
cross-validation:
  policies:
    # ETH1 — balance reads corroborated by both vendors before returning.
    - chain-id: ETH1
      api-interface: jsonrpc
      method: eth_getBalance
      enabled: true
      agreement-threshold: 2          # both sources must return identical responses
      max-participants: 2             # fan out to both
      min-groups: 2                   # spanning both distinct group-labels (publicnode + tenderly)

    # ETH1 — receipts must be unanimous across both groups.
    - chain-id: ETH1
      api-interface: jsonrpc
      method: eth_getTransactionReceipt
      enabled: true
      agreement-threshold: 2
      max-participants: 2
      min-groups: 2

    # SOLANA — epoch info corroborated across both groups.
    - chain-id: SOLANA
      api-interface: jsonrpc
      method: getEpochInfo
      enabled: true
      agreement-threshold: 2
      max-participants: 2
      min-groups: 2

    # COSMOSHUB REST — corroborate a bank balance query across both vendors.
    - chain-id: COSMOSHUB
      api-interface: rest
      method: cosmos.bank.v1beta1.Query/Balance
      enabled: true
      agreement-threshold: 2
      max-participants: 2
      min-groups: 2
