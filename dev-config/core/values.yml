# Sample Smart Router configuration for local development
# This file is mounted into the backend container for testing

routers:
  # Ethereum - JSON-RPC with archive
  - id: Ethereum
    network: eth1
    nodes:
      - name: lava
        endpoints:
          - url: https://eth1.lava.build
            interface: jsonrpc
            addons:
              - archive

  # Arbitrum - JSON-RPC with archive and trace
  - id: Arbitrum
    network: arbitrum
    nodes:
      - name: lava
        endpoints:
          - url: https://arb1.lava.build
            interface: jsonrpc
            addons:
              - archive
              - trace

  # NEAR - JSON-RPC with archive
  - id: Near
    network: near
    nodes:
      - name: lava
        endpoints:
          - url: https://near.lava.build
            interface: jsonrpc
            addons:
              - archive

  # Solana - JSON-RPC without addons
  - id: Solana
    network: solana
    nodes:
      - name: lava
        endpoints:
          - url: https://solana.lava.build
            interface: jsonrpc
            addons: []

  # Cosmos - TendermintRPC and REST with archive
  - id: Lava
    network: lava
    nodes:
      - name: lava
        endpoints:
          - url: https://lava.tendermintrpc.lava.build
            interface: tendermintrpc
            addons:
              - archive
          - url: https://lava.rest.lava.build
            interface: rest
            addons:
              - archive
