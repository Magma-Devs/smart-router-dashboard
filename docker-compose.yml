  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ../../values:/app/helm-values
      - ../../scripts:/app/scripts
      - ${KUBECONFIG_PATH:-~/.kube/config}:/root/.kube/config:ro
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - PROMETHEUS_URL=http://prometheus.lava.infra:1234
    extra_hosts:
      - "prometheus.lava.infra:127.0.0.1"
    network_mode: "host"
