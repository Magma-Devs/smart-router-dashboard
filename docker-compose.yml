version: "3.8"

services:
  # frontend:
  #   build:
  #     context: ./services/frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NODE_ENV=production
  #   restart: unless-stopped
  #   # For development, you can uncomment these lines to enable hot reloading
  #   # volumes:
  #   #   - ./:/app
  #   #   - /app/node_modules
  #   #   - /app/.next

  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./ssl:/etc/nginx/ssl  # Uncomment for SSL
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dashboard-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - ../../values:/app/helm-values
      - ../../scripts:/app/scripts
      - ${KUBECONFIG_PATH:-~/.kube/config}:/root/.kube/config:ro
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - PROMETHEUS_URL=http://prometheus.lava.infra:1234
    extra_hosts:
      - "prometheus.lava.infra:127.0.0.1"
    restart: unless-stopped
    networks:
      - dashboard-network

networks:
  dashboard-network:
    driver: bridge
