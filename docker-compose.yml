# Smart Router Dashboard — SELF-CONTAINED production-style stack.
#
#   # Everything from nothing (router + prometheus + api + web):
#   docker compose --profile router up --build
#
#   # Dashboard + Prometheus only (a router already runs on the host's :7779):
#   docker compose up --build
#
# Endpoints:
#   http://localhost:3000        dashboard UI
#   http://localhost:8000        dashboard API (/health, /api/metrics/*, /docs)
#   http://localhost:9090        Prometheus
#   http://localhost:3360-3367   router listen ports (multichain dev-config):
#     3360 ETH1 · 3361 SOLANA · 3362 BTC · 3363 HYPERLIQUID ·
#     3364-3366 COSMOSHUB rest/tendermint/grpc · 3367 APT1
#
#   # With the logs profile (--profile logs):
#   http://localhost:3001        Grafana → "Smart Router Dashboard Logs" (admin/admin)
#   http://localhost:3100        Loki API
#
# ONE values file drives BOTH the router and the dashboard (the v1 pattern):
# SR_CONFIG_HOST (default ./dev-config/values.yml) is mounted as the router's
# config AND as the api's helm-values, so the Endpoints/Providers pages always
# reflect the running topology. It can be either format the api understands —
# a raw smart-router SR_CONFIG or helm-chart values.
#
# The router profile pulls the published image (ghcr.io/magma-devs/smart-router
# :latest) and loads specs straight from the lava-specs GitHub repo via
# --use-static-spec (SR_SPEC, default https://github.com/Magma-Devs/lava-specs
# /tree/main) — no smart-router checkout, no volume mount.

name: smart-router-dashboard

services:
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  router:
    profiles: ["router"]
    # Published router image from GHCR (override with SR_ROUTER_IMAGE). Pinned
    # to :main because the command uses --cors-expose-headers, which ships on
    # :main and rolls into :latest on the next tagged release — switch back to
    # :latest once it's there. The release image is binary-only (no bundled
    # specs/), so specs are loaded straight from the lava-specs GitHub repo —
    # no checkout, no volume mount. --use-static-spec accepts a remote GitHub/
    # GitLab repo URL in the form https://github.com/{owner}/{repo}/tree/{branch}.
    image: ${SR_ROUTER_IMAGE:-ghcr.io/magma-devs/smart-router:main}
    pull_policy: ${SR_ROUTER_PULL:-always}
    command:
      - "values.yml"
      - "--use-static-spec"
      - "${SR_SPEC:-https://github.com/Magma-Devs/lava-specs/tree/main}"
      # GitHub PAT for fetching specs from the lava-specs GitHub repo above.
      # Unauthenticated GitHub API is rate-limited to 60 req/hour; a token lifts
      # that to 5,000/hour (and unlocks private repos). Empty by default — the
      # router treats "" as unauthenticated, so leave SR_GITHUB_TOKEN unset for
      # the normal public-repo path and set it only if you hit rate limits.
      - "--github-token"
      - "${SR_GITHUB_TOKEN:-}"
      # The browser live-test panel preflights cross-origin POSTs.
      - "--cors-headers"
      - "*"
      # Expose the router's relay-provenance headers so the dashboard's Live
      # test can show which upstream served a request (and "Cached" on a cache
      # hit). Read by the browser from the Lava-Provider-Address response header.
      - "--cors-expose-headers"
      - "Lava-Provider-Address,Lava-Retries,Provider-Latest-Block,lava-cross-validation-agreeing-providers,lava-cross-validation-disagreeing-providers"
      - "--log-level"
      - "${SR_LOG_LEVEL:-info}"
      - "--log-format"
      - "${SR_LOG_FORMAT:-json}"
      # HTTP-only upstreams boot cleanly; wss subscriptions still work where
      # a wss url is configured.
      - "--skip-websocket-verification"
    volumes:
      - ${SR_CONFIG_HOST:-./dev-config/values.yml}:/smart-router/values.yml:ro
    ports:
      # Multichain dev-config: one listen port per chain×interface (see
      # dev-config/values.yml). 3360 ETH1 · 3361 SOLANA · 3362 BTC ·
      # 3363 HYPERLIQUID · 3364-3366 COSMOSHUB rest/tendermint/grpc · 3367 APT1.
      - "3360-3367:3360-3367"
      - "7779:7779" # prometheus metrics
    restart: unless-stopped

  # ---- Logs stack (opt-in via `--profile logs`) --------------------------
  # Loki + Promtail + Grafana. Promtail tails this project's container logs
  # (api/web/prometheus/router), parses the router's zerolog JSON, and pushes
  # to Loki; Grafana shows them on a pre-provisioned board. No change to any
  # other service — discovery is via Docker labels. Grafana is on host :3001
  # (web owns :3000). Start with e.g.:
  #   docker compose --profile router --profile logs up --build
  loki:
    profiles: ["logs"]
    image: grafana/loki:3.4.2
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./deploy/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  promtail:
    profiles: ["logs"]
    image: grafana/promtail:3.4.2
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./deploy/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Read-only Docker socket for container discovery + log tailing.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    restart: unless-stopped
    depends_on:
      - loki

  grafana:
    profiles: ["logs"]
    image: grafana/grafana:11.5.2
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USERNAME:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/smart-router-dashboard-logs.json
      # Grafana listens on :3000 inside the container; only the HOST port is
      # remapped to :3001 so it doesn't clash with web (:3000).
      - GF_SERVER_ROOT_URL=http://localhost:3001/
    volumes:
      - ./deploy/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./deploy/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - loki

  # Auth backing store — ONLY needed when AUTH_MODE=enabled. Start it with
  # the `auth` profile: docker compose --profile router --profile auth up.
  # The api connects lazily (retry loop at boot) so there's no hard
  # depends_on and AUTH_MODE=disabled keeps the zero-dependency boot.
  postgres:
    profiles: ["auth"]
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=sr
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dev}
      - POSTGRES_DB=sr_dashboard
    volumes:
      # PG18 image convention: mount ONE level up from the data dir
      # (/var/lib/postgresql, not .../data) — the old path errors at boot.
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sr -d sr_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-dev}
        APP_VERSION: ${APP_VERSION:-0.0.0}
    environment:
      - NODE_ENV=production
      - API_PORT=8000
      - PROMETHEUS_URL=http://prometheus:9090
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - HELM_VALUES_DIR=/app/helm-values
      # Auth (see docs/AUTH.md): disabled (default) needs none of the rest.
      - AUTH_MODE=${AUTH_MODE:-disabled}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - DATABASE_URL=${DATABASE_URL:-postgres://sr:dev@postgres:5432/sr_dashboard}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Needed api-side to validate the `aud` claim of Google ID tokens.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    volumes:
      # Mount the live router config so /api/config/routers reflects the
      # running topology — exactly the v1 mechanism (core/values.yml).
      - ${SR_CONFIG_HOST:-./dev-config/values.yml}:/app/helm-values/core/values.yml:ro
    ports:
      - "8000:8000"
    depends_on:
      - prometheus
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_LOCAL_MODE: "true"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_LOCAL_MODE=true
      # Base URL of the Grafana that hosts the logs board — the "View full logs"
      # button links here (read at runtime via /api/config, so one published
      # image serves any host). Defaults to the bundled `logs` profile's Grafana
      # on :3001; set it to your Grafana origin in a real deployment.
      - DASHBOARD_GRAFANA_URL=${DASHBOARD_GRAFANA_URL:-http://localhost:3001}
      # Auth (see docs/AUTH.md) — same AUTH_MODE + AUTH_SECRET as the api.
      - AUTH_MODE=${AUTH_MODE:-disabled}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - INTERNAL_API_BASE_URL=http://api:8000
      # OAuth providers — the login page shows a provider's button only
      # when its id+secret pair is set.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  prometheus-data:
  postgres-data:
  loki-data:
  promtail-positions:
  grafana-data:
